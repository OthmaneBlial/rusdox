name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: rusdox
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            bin: rusdox
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            bin: rusdox
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rusdox.exe
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin rusdox --target ${{ matrix.target }}

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.bin }}
          tar -czf rusdox-${{ matrix.target }}.tar.gz -C dist ${{ matrix.bin }}

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "rusdox-${{ matrix.target }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rusdox-${{ matrix.target }}
          path: rusdox-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rusdox-*
          merge-multiple: true

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: rusdox-*
