version: 2
multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
    open-pull-requests-limit: 10
