output_name: product-launch-brief
blocks:
  - type: title
    text: Product Launch Brief
  - type: subtitle
    text: Analytics Module
  - type: hero
    text: Internal launch packet for GTM, support, and leadership
  - type: section
    text: Launch Narrative
  - type: body
    text: The analytics module turns weekly CSV exports into a live dashboard experience with trend summaries, cohort breakdowns, and alerting. The launch goal is to convert analyst-heavy workflows into a daily operating surface used by customer success and finance leads.
  - type: section
    text: What Changes For Customers
  - type: bullets
    items:
      - Time-to-insight drops from hours to minutes for weekly reviews.
      - Account health indicators move from static exports to live views.
      - Ops leaders can spot expansion or churn signals before QBRs.
