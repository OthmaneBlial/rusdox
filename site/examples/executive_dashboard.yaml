    text: The operating model held under increased demand. Enterprise expansion offset a slower mid-market pipeline, and the support backlog stayed below the target threshold through the quarter.
  - type: body
    text: Leadership focus for the next 60 days is disciplined staffing, launch readiness for the analytics module, and reducing the onboarding drop-off rate in the first two weeks.
