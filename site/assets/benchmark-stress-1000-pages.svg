<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">RusDox 1000-page YAML stress benchmark</title>
  <desc id="desc">Benchmark summary for RusDox showing latest dev and release timings for the 1000-page YAML stress workflow, including YAML parse, document composition, DOCX write, PDF render, and total output time.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="100%" stop-color="#eef4f2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f8fbfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#10221b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect x="40" y="34" width="1120" height="552" rx="30" fill="url(#frame)" filter="url(#shadow)"/>

  <text x="94" y="108" font-family="Georgia, Times New Roman, serif" font-size="40" font-weight="700" fill="#152033">RusDox Stress Benchmark</text>

  <rect x="882" y="68" width="220" height="42" rx="21" fill="#12261e"/>
  <text x="992" y="95" text-anchor="middle" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f8fbfa">Fastest total 679.86 ms</text>

  <rect x="86" y="154" width="492" height="356" rx="24" fill="#ffffff" stroke="#d7e0db" stroke-width="2"/>
  <rect x="86" y="154" width="10" height="356" rx="5" fill="#c6703a"/>
  <text x="124" y="206" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="1.6" fill="#8b5e3c">DEV PROFILE</text>
  <text x="124" y="236" font-family="Georgia, Times New Roman, serif" font-size="30" font-weight="700" fill="#152033">YAML Stress Flow</text>

  <text x="124" y="292" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">YAML parse</text>
  <text x="530" y="292" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">176.81 ms</text>
  <line x1="124" y1="308" x2="540" y2="308" stroke="#e6ece9" stroke-width="2"/>

  <text x="124" y="348" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">Doc compose</text>
  <text x="530" y="348" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">34.23 ms</text>
  <line x1="124" y1="364" x2="540" y2="364" stroke="#e6ece9" stroke-width="2"/>

  <text x="124" y="404" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">DOCX write</text>
  <text x="530" y="404" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">285.66 ms</text>
  <line x1="124" y1="420" x2="540" y2="420" stroke="#e6ece9" stroke-width="2"/>

  <text x="124" y="460" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">PDF render</text>
  <text x="530" y="460" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#0d6b5b">289.04 ms</text>
  <line x1="124" y1="476" x2="540" y2="476" stroke="#e6ece9" stroke-width="2"/>

  <text x="124" y="532" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#152033">Output total</text>
  <text x="530" y="532" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#152033">785.78 ms</text>

  <rect x="622" y="154" width="492" height="356" rx="24" fill="#ffffff" stroke="#d7e0db" stroke-width="2"/>
  <rect x="622" y="154" width="10" height="356" rx="5" fill="#0d6b5b"/>
  <text x="660" y="206" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="1.6" fill="#0d6b5b">RELEASE PROFILE</text>
  <text x="660" y="236" font-family="Georgia, Times New Roman, serif" font-size="30" font-weight="700" fill="#152033">YAML Stress Flow</text>

  <text x="660" y="292" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">YAML parse</text>
  <text x="1066" y="292" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">132.78 ms</text>
  <line x1="660" y1="308" x2="1076" y2="308" stroke="#e6ece9" stroke-width="2"/>

  <text x="660" y="348" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">Doc compose</text>
  <text x="1066" y="348" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">27.78 ms</text>
  <line x1="660" y1="364" x2="1076" y2="364" stroke="#e6ece9" stroke-width="2"/>

  <text x="660" y="404" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">DOCX write</text>
  <text x="1066" y="404" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263240">234.32 ms</text>
  <line x1="660" y1="420" x2="1076" y2="420" stroke="#e6ece9" stroke-width="2"/>

  <text x="660" y="460" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" fill="#263240">PDF render</text>
  <text x="1066" y="460" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#0d6b5b">284.91 ms</text>
  <line x1="660" y1="476" x2="1076" y2="476" stroke="#e6ece9" stroke-width="2"/>

  <text x="660" y="532" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#152033">Output total</text>
  <text x="1066" y="532" text-anchor="end" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#152033">679.86 ms</text>
</svg>
